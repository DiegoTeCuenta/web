<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D HUNTER — Caza en lo oscuro</title>
<style>
  /* ============================================================
     EL HUNTER — Fase 1 (modo: Zombies / Warehouse)
     Paleta: noche industrial + ámbar de luces viejas + beam espectral
     ============================================================ */
  :root{
    --negro:    #0b0d10;   /* base, casi negro azulado */
    --panel:    #14181f;   /* paneles y tarjetas */
    --linea:    #232a33;   /* bordes sutiles */
    --ambar:    #e8b13a;   /* luces de warehouse, monedas */
    --beam:     #7ef0c0;   /* verde espectral: laser, acentos */
    --texto:    #c8d0da;
    --apagado:  #5d6b66;
    --peligro:  #c0392b;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:var(--negro); color:var(--texto);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow:hidden; -webkit-user-select:none; user-select:none; }

  /* ---------- contenedor general ---------- */
  #app{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }

  /* ============ PANTALLA DE TÍTULO ============ */
  #title{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:34px; z-index:20;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, #161c25 0%, transparent 60%),
      var(--negro);
  }
  /* niebla baja animada */
  #title::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:32%;
    background: linear-gradient(to top, rgba(126,240,192,.05), transparent);
    pointer-events:none;
    animation: fog 7s ease-in-out infinite alternate;
  }
  @keyframes fog{ from{ opacity:.4 } to{ opacity:1 } }

  .eyebrow{
    letter-spacing:.42em; font-size:12px; text-transform:uppercase;
    color:var(--ambar); opacity:.85;
  }
  h1{
    font-family: "Arial Black", Impact, system-ui, sans-serif;
    font-size: clamp(46px, 9vw, 96px);
    line-height:.95; letter-spacing:.02em; color:#f2f5f8;
    text-transform:uppercase; text-align:center;
    text-shadow: 0 0 22px rgba(126,240,192,.25);
    animation: fluor 4.5s linear infinite;  /* parpadeo de fluorescente viejo */
  }
  h1 span{ color:var(--beam); }
  @keyframes fluor{
    0%,7%,9%,100%{ opacity:1 }
    8%{ opacity:.55 }
    61%{ opacity:1 } 62%{ opacity:.7 } 63%{ opacity:1 }
  }
  .tag{ font-size:14px; opacity:.65; letter-spacing:.08em; margin-top:-18px; }

  /* tarjetas de modo */
  #modes{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center; padding:0 18px; }
  .mode{
    width:200px; padding:18px 16px 16px; border:1px solid var(--linea);
    background:linear-gradient(180deg, #181d25, var(--panel));
    border-radius:10px; cursor:pointer; text-align:left;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    color:var(--texto); font-family:inherit;
  }
  .mode:hover:not(.locked), .mode:focus-visible:not(.locked){
    transform:translateY(-3px); border-color:var(--beam);
    box-shadow:0 8px 28px rgba(126,240,192,.12); outline:none;
  }
  .mode .vs{ font-size:11px; letter-spacing:.28em; color:var(--ambar); text-transform:uppercase; }
  .mode h2{ font-size:20px; margin:6px 0 4px; color:#eef2f6; font-weight:800; }
  .mode p{ font-size:12.5px; line-height:1.45; opacity:.7; }
  .mode .dif{ display:inline-block; margin-top:10px; font-size:11px; letter-spacing:.12em;
    color:var(--beam); border:1px solid rgba(126,240,192,.35); border-radius:99px; padding:3px 10px; }
  .mode.locked{ opacity:.45; cursor:not-allowed; filter:saturate(.4); }
  .mode.locked .dif{ color:var(--texto); border-color:var(--linea); }

  .hint{ font-size:12.5px; opacity:.55; letter-spacing:.05em; text-align:center; line-height:1.7; }
  .hint b{ color:var(--ambar); font-weight:600; }

  /* ============ JUEGO ============ */
  #gameWrap{ position:absolute; inset:0; display:none; }
  canvas{ display:block; width:100%; height:100%; background:var(--negro); }

  /* HUD */
  #hud{
    position:absolute; top:0; left:0; right:0; display:none;
    justify-content:space-between; align-items:flex-start;
    padding:14px 18px; pointer-events:none; z-index:10;
    font-family:"Arial Black", Impact, system-ui, sans-serif;
  }
  .hudBox{ background:rgba(11,13,16,.55); border:1px solid var(--linea);
    border-radius:8px; padding:8px 14px; display:flex; gap:18px; backdrop-filter: blur(3px); }
  .stat{ display:flex; align-items:center; gap:7px; font-size:15px; letter-spacing:.05em; }
  .stat .ico{ font-size:16px; }
  .stat.coins .val{ color:var(--ambar); }
  .stat.ammo  .val{ color:var(--beam); }
  .stat.lives .val{ color:var(--peligro); }
  .stat.score .val{ color:#eef2f6; }

  /* mensajes centrales (game over / victoria / pausa) */
  #overlay{
    position:absolute; inset:0; display:none; z-index:15;
    align-items:center; justify-content:center; flex-direction:column; gap:18px;
    background:rgba(7,9,11,.78); text-align:center; padding:20px;
  }
  #overlay h2{ font-family:"Arial Black", Impact, sans-serif; font-size:clamp(34px,7vw,64px);
    text-transform:uppercase; color:#f2f5f8; letter-spacing:.03em; }
  #overlay h2.win{ color:var(--beam); text-shadow:0 0 30px rgba(126,240,192,.4); }
  #overlay h2.lose{ color:var(--peligro); }
  #overlay p{ opacity:.75; font-size:15px; }
  .btn{
    pointer-events:auto; cursor:pointer; font-family:inherit; font-weight:800;
    background:var(--beam); color:#06231a; border:none; border-radius:8px;
    padding:12px 26px; font-size:15px; letter-spacing:.08em; text-transform:uppercase;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(126,240,192,.35); }
  .btn.ghost{ background:transparent; color:var(--texto); border:1px solid var(--linea); }

  /* controles táctiles (solo se muestran en pantallas touch) */
  #touch{ position:absolute; inset:auto 0 0 0; display:none; z-index:12;
    justify-content:space-between; padding:0 16px 18px; pointer-events:none; }
  .tgroup{ display:flex; gap:12px; }
  .tbtn{
    pointer-events:auto; width:64px; height:64px; border-radius:50%;
    background:rgba(20,24,31,.6); border:1px solid var(--linea); color:var(--texto);
    font-size:24px; display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent; touch-action:none;
  }
  .tbtn:active{ background:rgba(126,240,192,.25); border-color:var(--beam); }
  @media (pointer:coarse){ #touch{ display:flex; } }
</style>
</head>
<body>
<div id="app">

  <!-- ============ TÍTULO ============ -->
  <div id="title">
    <div class="eyebrow">Diego te cuenta presenta</div>
    <h1>D <span>HUNTER</span></h1>
    <div class="tag">Caza en lo oscuro. Recarga con monedas. No te dejes alcanzar.</div>

    <div id="modes">
      <button class="mode" id="modeZombies">
        <div class="vs">Hunter vs</div>
        <h2>Zombies</h2>
        <p>Un warehouse abandonado. Lentos, pero aguantan. Llega a la salida.</p>
        <span class="dif">Jugar ahora</span>
      </button>

      <button class="mode locked" tabindex="-1">
        <div class="vs">Hunter vs</div>
        <h2>Brujas</h2>
        <p>Un pueblo antiguo abandonado. Atacan a distancia.</p>
        <span class="dif">Próximamente</span>
      </button>

      <button class="mode locked" tabindex="-1">
        <div class="vs">Hunter vs</div>
        <h2>Fantasmas</h2>
        <p>El cementerio. Rápidos. Aparecen y desaparecen.</p>
        <span class="dif">Próximamente</span>
      </button>
    </div>

    <div class="hint">
      <b>← →</b> o <b>A D</b> moverse &nbsp;·&nbsp; <b>↑ / W / Espacio</b> saltar &nbsp;·&nbsp;
      <b>X / J / clic</b> disparar &nbsp;·&nbsp; <b>P</b> pausa
    </div>
  </div>

  <!-- ============ JUEGO ============ -->
  <div id="gameWrap">
    <canvas id="cv"></canvas>

    <div id="hud">
      <div class="hudBox">
        <div class="stat lives"><span class="ico">❤</span><span class="val" id="hLives">3</span></div>
        <div class="stat ammo"><span class="ico">⚡</span><span class="val" id="hAmmo">10</span></div>
        <div class="stat coins"><span class="ico">●</span><span class="val" id="hCoins">0</span></div>
      </div>
      <div class="hudBox">
        <div class="stat score"><span class="val" id="hScore">0</span></div>
      </div>
    </div>

    <div id="overlay">
      <h2 id="ovTitle">Pausa</h2>
      <p id="ovText"></p>
      <div style="display:flex; gap:12px;">
        <button class="btn" id="ovMain">Reintentar</button>
        <button class="btn ghost" id="ovMenu">Menú</button>
      </div>
    </div>

    <div id="touch">
      <div class="tgroup">
        <div class="tbtn" data-k="left">◀</div>
        <div class="tbtn" data-k="right">▶</div>
      </div>
      <div class="tgroup">
        <div class="tbtn" data-k="shoot">⚡</div>
        <div class="tbtn" data-k="jump">▲</div>
      </div>
    </div>
  </div>

</div>

/* ---------------- AUDIO ----------------
   Busca tus archivos en ./sounds/ (cuando lo subas a GitHub Pages,
   crea esa carpeta y pon ahí tus mp3/wav con estos nombres).
   Si un archivo no existe, usa un sonido sintetizado de respaldo,
   así el juego SIEMPRE tiene feedback sonoro. */
const SOUND_FILES = {
  beam:       'sounds/beam.mp3',
  coin:       'sounds/coin.mp3',
  zombie_die: 'sounds/zombie_die.mp3',
  power:      'sounds/power.mp3',
  gameover:   'sounds/gameover.mp3',
  music:      'sounds/music_loop.mp3',   // tu loop de tensión tipo pursuit
};

const AudioMgr = {
  ctx:null, buffers:{}, musicEl:null, musicOk:false, on:true,
  init(){
    if (this.ctx) return;
    this.ctx = new (window.AudioContext||window.webkitAudioContext)();
    // intenta cargar cada archivo; si falla, queda el sintetizador
    for (const [name,url] of Object.entries(SOUND_FILES)){
      if (name==='music'){
        const el = new Audio(); el.src=url; el.loop=true; el.volume=.35;
        el.addEventListener('canplaythrough', ()=>{ this.musicOk=true; }, {once:true});
        el.addEventListener('error', ()=>{ this.musicOk=false; }, {once:true});
        this.musicEl = el;
        continue;
      }
      fetch(url).then(r=>{ if(!r.ok) throw 0; return r.arrayBuffer(); })
        .then(ab=>this.ctx.decodeAudioData(ab))
        .then(buf=>{ this.buffers[name]=buf; })
        .catch(()=>{ /* sin archivo: usará synth */ });
    }
  },
  play(name){
    if (!this.on || !this.ctx) return;
    if (this.ctx.state==='suspended') this.ctx.resume();
    const buf = this.buffers[name];
    if (buf){
      const s=this.ctx.createBufferSource(); s.buffer=buf;
      const g=this.ctx.createGain(); g.gain.value=.5;
      s.connect(g).connect(this.ctx.destination); s.start();
    } else this.synth(name);
  },
  music(playing){
    if (!this.musicEl || !this.musicOk) return;
    if (playing){ this.musicEl.currentTime=0; this.musicEl.play().catch(()=>{}); }
    else this.musicEl.pause();
  },
  /* respaldo sintetizado: bips simples por tipo */
  synth(name){
    const c=this.ctx, t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.connect(g).connect(c.destination);
    const cfg = {
      beam:       [ 'sawtooth', 880, 220, .08, .12 ],
      coin:       [ 'square',  1320, 1760, .05, .10 ],
      zombie_die: [ 'triangle', 220,  60, .25, .30 ],
      power:      [ 'sine',     440, 880, .15, .25 ],
      gameover:   [ 'sawtooth', 330,  55, .60, .80 ],
      hurt:       [ 'square',   160,  80, .12, .15 ],
      jump:       [ 'sine',     300, 520, .07, .10 ],
    }[name] || [ 'sine', 440, 440, .1, .1 ];
    o.type=cfg[0];
    o.frequency.setValueAtTime(cfg[1], t);
    o.frequency.exponentialRampToValueAtTime(Math.max(cfg[2],1), t+cfg[3]);
    g.gain.setValueAtTime(.18, t);
    g.gain.exponentialRampToValueAtTime(.001, t+cfg[4]);
    o.start(t); o.stop(t+cfg[4]+.02);
  }
};

/* ---------------- UTILIDADES ---------------- */
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const aabb=(a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

/* ---------------- SPRITES ---------------- */
const sprites={};
function loadSprites(){
  const defs={ player:IMG_PLAYER, zombie:IMG_ZOMBIE, coin:IMG_COIN, bgfar:IMG_BG_FAR,
               floor:IMG_FLOOR, shelf1:IMG_SHELF1, shelf2:IMG_SHELF2, shelf3:IMG_SHELF3,
               fire:IMG_FIRE, jump:IMG_JUMP,
               walk1:IMG_WALK1, walk2:IMG_WALK2, walk3:IMG_WALK3, walk4:IMG_WALK4,
               zwalk1:IMG_ZWALK1, zwalk2:IMG_ZWALK2, zwalk3:IMG_ZWALK3, zwalk4:IMG_ZWALK4 };
  return Promise.all(Object.entries(defs).map(([k,src])=>new Promise(res=>{
    const im=new Image(); im.onload=()=>{ sprites[k]=im; res(); }; im.src=src;
  })));
}

/* ---------------- ENTRADA ---------------- */
const keys={ left:false, right:false, jump:false, shoot:false };
const keymap={
  ArrowLeft:'left', a:'left', A:'left',
  ArrowRight:'right', d:'right', D:'right',
  ArrowUp:'jump', w:'jump', W:'jump', ' ':'jump',
  x:'shoot', X:'shoot', j:'shoot', J:'shoot',
};
addEventListener('keydown', e=>{
  if (e.key==='p'||e.key==='P'||e.key==='Escape'){ if(Game.state==='play'||Game.state==='pause') Game.togglePause(); return; }
  const k=keymap[e.key]; if(k){ keys[k]=true; e.preventDefault(); }
});
addEventListener('keyup', e=>{ const k=keymap[e.key]; if(k) keys[k]=false; });

/* controles táctiles */
document.querySelectorAll('.tbtn').forEach(b=>{
  const k=b.dataset.k;
  const on =e=>{ e.preventDefault(); keys[k]=true; };
  const off=e=>{ e.preventDefault(); keys[k]=false; };
  b.addEventListener('touchstart',on,{passive:false});
  b.addEventListener('touchend',off); b.addEventListener('touchcancel',off);
});

/* Catálogo de anaqueles: cada tipo define qué sprite usa y su ALTO en juego.
   El ancho se calcula al cargar, según la proporción real del sprite.
   La superficie de pisada es la TAPA (borde superior del sprite). */
const SHELF_TYPES = {
  low:  { sprite:'shelf1', h:120 },   // marco vacío, tapa plana
  wide: { sprite:'shelf3', h:128 },   // barriles, ancho y bajo
  tall: { sprite:'shelf2', h:208 },   // 3 niveles, plataforma alta (reto)
};
function shelfW(type){
  const s=SHELF_TYPES[type], img=sprites[s.sprite];
  return img ? img.width * (s.h/img.height) : 160;
}

/* ---------------- ACTUALIZACIÓN ---------------- */
function update(dt){
  const G=Game, L=G.lvl, P=G.player;
  G.time+=dt;

  /* --- jugador: movimiento horizontal con aceleración --- */
  const ACC=2600, MAXV=340, FRICTION=2200;
  if (keys.left){  P.vx=Math.max(P.vx-ACC*dt,-MAXV); P.dir=-1; }
  else if (keys.right){ P.vx=Math.min(P.vx+ACC*dt, MAXV); P.dir=1; }
  else { // frenado
    if (P.vx>0) P.vx=Math.max(0,P.vx-FRICTION*dt);
    else        P.vx=Math.min(0,P.vx+FRICTION*dt);
  }

  /* --- salto con coyote time + jump buffer (esto es el "game feel") --- */
  P.coyote   = P.onGround ? .11 : Math.max(0,P.coyote-dt);
  P.jumpBuf  = keys.jump  ? .12 : Math.max(0,P.jumpBuf-dt);
  if (P.jumpBuf>0 && P.coyote>0){
    P.vy=-860; P.coyote=0; P.jumpBuf=0; P.onGround=false;
    AudioMgr.play('jump');
    spawnDust(P.x+P.w/2, P.y+P.h, 6);
  }
  /* salto cortado: soltar el botón corta la subida (más control) */
  if (!keys.jump && P.vy<-260) P.vy=-260;

  /* --- gravedad y colisiones --- */
  P.vy += L.gravity*dt;
  P.vy = Math.min(P.vy, 1300);
  moveAndCollide(P, dt);

  /* caer en un hueco: cuesta una vida y reaparece en terreno firme */
  if (P.y > L.groundY+170){
    P.lives--;
    AudioMgr.play('hurt'); G.shake=7;
    if (P.lives<=0){ Game.gameOver(); }
    else { P.x=P.safeX; P.y=P.safeY-2; P.vx=0; P.vy=0; P.inv=1.4; }
  }

  /* --- disparo --- */
  P.shootCd=Math.max(0,P.shootCd-dt);
  if (keys.shoot && P.shootCd<=0){
    if (P.ammo>0){
      P.ammo--;
      P.shootCd=.22;
      const bx = P.dir>0 ? P.x+P.w-6 : P.x+6;
      G.beams.push({ x:bx, y:P.y+P.h*.42, w:34, h:6, vx:P.dir*820, life:.9 });
      AudioMgr.play('beam');
      spawnFlash(bx+(P.dir>0?10:-10), P.y+P.h*.42);
      G.shake=Math.min(G.shake+.8,3);
    } else {
      P.shootCd=.3; // clic en vacío: pequeño cooldown igual
    }
  }

  /* --- beams --- */
  for (const b of G.beams){
    b.x += b.vx*dt; b.life-=dt;
    for (const z of G.zombies){
      if (z.dead) continue;
      if (aabb(b,z)){
        b.life=0; z.hp--; z.hitT=.15;
        spawnSparks(b.x+(b.vx>0?b.w:0), b.y, 8);
        if (z.hp<=0){
          z.dead=true; G.score+=100;
          AudioMgr.play('zombie_die');
          spawnPoof(z.x+z.w/2, z.y+z.h/2);
          G.shake=Math.min(G.shake+2,5);
        }
      }
    }
  }
  G.beams = G.beams.filter(b=>b.life>0 && b.x>-60 && b.x<L.worldW+60);

  /* --- zombies: patrulla + daño por contacto --- */
  for (const z of G.zombies){
    if (z.dead){ z.fade=Math.max(0,z.fade-dt*2.2); continue; }
    z.hitT=Math.max(0,z.hitT-dt);
    z.bob+=dt*5;
    z.walkPhase = (z.walkPhase||rnd(0,4)) + Math.abs(z.vx)*dt/40;
    z.x += z.vx*z.dir*dt;
    if (z.x<z.minX){ z.x=z.minX; z.dir=1; }
    if (z.x+z.w>z.maxX){ z.x=z.maxX-z.w; z.dir=-1; }
    if (P.inv<=0 && aabb(P,z)) hurtPlayer(1, z);
  }
  G.zombies = G.zombies.filter(z=>!z.dead || z.fade>0);
  P.inv=Math.max(0,P.inv-dt);

  /* --- monedas: recogen y RECARGAN el arma (+2 de energía) --- */
  for (const c of G.coins){
    c.t+=dt*4;
    if (!c.got && aabb(P,c)){
      c.got=true; P.coins++; P.ammo+=2; G.score+=25;
      AudioMgr.play('coin');
      spawnCoinPop(c.x+c.w/2, c.y);
    }
  }

  /* --- partículas --- */
  for (const p of G.particles){
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.g*dt; p.life-=dt;
  }
  G.particles=G.particles.filter(p=>p.life>0);

  /* --- victoria: llegar a la puerta de salida --- */
  if (P.x+P.w > L.exitX) Game.win();

  /* fase de animación de caminata (avanza con la velocidad) */
  P.walkPhase = (P.walkPhase||0) + Math.abs(P.vx)*dt/42;

  /* --- cámara con suavizado --- */
  const target = clamp(P.x + P.w/2 - (VW/SCALE)/2, 0, L.worldW-(VW/SCALE));
  G.cam.x = lerp(G.cam.x, target, 1-Math.pow(.001,dt));
  G.shake = Math.max(0,G.shake-dt*10);

  /* HUD */
  document.getElementById('hLives').textContent=P.lives;
  document.getElementById('hAmmo').textContent=P.ammo;
  document.getElementById('hCoins').textContent=P.coins;
  document.getElementById('hScore').textContent=G.score;
}

/* colisión jugador vs suelo y plataformas (one-way para plataformas) */
function moveAndCollide(P, dt){
  const L=Game.lvl;
  P.x += P.vx*dt;
  P.x = clamp(P.x, 0, L.worldW-P.w);
  const prevY = P.y;
  P.y += P.vy*dt;
  P.onGround=false;
  /* suelo: existe salvo encima de un hueco */
  const cx=P.x+P.w/2;
  const onPit = (L.pits||[]).some(([a,b])=>cx>a && cx<b);
  if (!onPit && P.y+P.h >= L.groundY){ P.y=L.groundY-P.h; P.vy=0; P.onGround=true; }
  /* plataformas one-way: solo si venías cayendo desde arriba */
  if (P.vy>=0){
    for (const pl of L.platforms){
      const pw=shelfW(pl.type), px=pl.x, py=L.groundY-SHELF_TYPES[pl.type].h;
      if (P.x+P.w>px && P.x<px+pw){
        if (prevY+P.h<=py+6 && P.y+P.h>=py){
          P.y=py-P.h; P.vy=0; P.onGround=true;
        }
      }
    }
  }
  /* recordar último terreno firme (para reaparecer si cae en hueco) */
  if (P.onGround && !(L.pits||[]).some(([a,b])=>P.x+P.w/2>a && P.x+P.w/2<b)){
    P.safeX=P.x; P.safeY=P.y;
  }
}

function hurtPlayer(dmg, src){
  const P=Game.player;
  if (P.inv>0) return;
  P.lives-=dmg;
  P.inv=1.4;
  AudioMgr.play('hurt');
  Game.shake=6;
  /* empujón hacia atrás respecto del enemigo */
  if (src){ P.vx = (P.x+P.w/2 < src.x+src.w/2 ? -1:1)*420; P.vy=-420; }
  if (P.lives<=0) Game.gameOver();
}

/* ---------------- PARTÍCULAS ---------------- */
function spawnDust(x,y,n){ for(let i=0;i<n;i++) Game.particles.push({x,y,vx:rnd(-90,90),vy:rnd(-60,-10),g:300,life:rnd(.2,.4),r:rnd(2,4),col:'#8a93a0'}); }
function spawnSparks(x,y,n){ for(let i=0;i<n;i++) Game.particles.push({x,y,vx:rnd(-260,260),vy:rnd(-260,160),g:600,life:rnd(.15,.35),r:rnd(1.5,3),col:'#7ef0c0'}); }
function spawnFlash(x,y){ Game.particles.push({x,y,vx:0,vy:0,g:0,life:.07,r:13,col:'rgba(126,240,192,.9)'}); }
function spawnPoof(x,y){
  for(let i=0;i<16;i++) Game.particles.push({x,y,vx:rnd(-180,180),vy:rnd(-220,40),g:240,life:rnd(.3,.65),r:rnd(3,7),col:i%3?'#9fb3a8':'#5d6b66'});
}
function spawnCoinPop(x,y){
  for(let i=0;i<10;i++) Game.particles.push({x,y,vx:rnd(-140,140),vy:rnd(-260,-80),g:520,life:rnd(.25,.5),r:rnd(2,4),col:'#e8b13a'});
}

/* ---------------- DIBUJO ---------------- */
function draw(){
  const G=Game, L=G.lvl, P=G.player;
  ctx.clearRect(0,0,VW,VH);
  ctx.save();
  ctx.scale(SCALE,SCALE);
  const shx = G.shake? rnd(-G.shake,G.shake):0;
  const shy = G.shake? rnd(-G.shake,G.shake):0;
  ctx.translate(-G.cam.x+shx, shy);
  const camX=G.cam.x, viewW=VW/SCALE;

  drawBackground(camX, viewW);
  drawPlatformsAndGround(camX, viewW);
  drawExit();
  drawCoins();
  drawZombies();
  drawBeams();
  drawPlayer();
  drawParticles();
  drawDarknessAndFlashlight();   // la firma visual: linterna en la oscuridad

  ctx.restore();
}

/* --- fondo del warehouse: 2 capas con parallax, dibujado por código.
       Cuando Diego tenga el arte final, se reemplaza por drawImage. --- */
function drawBackground(camX, viewW){
  /* capa lejana (parallax .35): tu imagen del warehouse, tileada en X */
  const bg = sprites.bgfar;
  ctx.fillStyle='#0b0d10';
  ctx.fillRect(camX,0,viewW,720);
  if (bg){
    const bw = bg.width * (720/bg.height);   // escala para que el alto calce a 720
    const p1 = camX*.35;                      // desplazamiento parallax
    let startX = camX - ((p1 % bw) + bw) % bw; // primer tile visible alineado al parallax
    for (let sx=startX; sx<camX+viewW+bw; sx+=bw){
      ctx.drawImage(bg, sx, 0, bw, 720);
    }
  }

  /* (la capa media procedural se retiró: tu bg_warehouse_far ya trae
     columnas, escalera, tubos y la lámpara horneados) */
}

function drawPlatformsAndGround(camX, viewW){
  const L=Game.lvl;
  /* --- piso tileado (tu floor_tile) con la pisada en groundY --- */
  const fl=sprites.floor;
  if (fl){
    const fw = fl.width, fh = fl.height;
    let startX = Math.floor(camX/fw)*fw - fw;
    for (let sx=startX; sx<camX+viewW+fw; sx+=fw){
      ctx.drawImage(fl, sx, L.groundY, fw, fh);
    }
    /* rellenar por debajo si el tile no llega hasta 720 */
    if (L.groundY+fh < 720){
      ctx.fillStyle='#2a241c';
      ctx.fillRect(camX-50, L.groundY+fh, viewW+100, 720-(L.groundY+fh));
    }
  } else {
    ctx.fillStyle='#171c23';
    ctx.fillRect(camX-50, L.groundY, viewW+100, 720-L.groundY);
  }

  /* huecos en el piso: pozo con profundidad que baja a la oscuridad */
  for (const [a,b] of (L.pits||[])){
    if (b<camX-60 || a>camX+viewW+60) continue;
    const w=b-a, top=L.groundY;
    /* gradiente vertical: tierra arriba -> negro abajo */
    const g=ctx.createLinearGradient(0, top, 0, 720);
    g.addColorStop(0,   '#211a11');
    g.addColorStop(.22, '#0d0a06');
    g.addColorStop(1,   '#040506');
    ctx.fillStyle=g;
    ctx.fillRect(a, top, w, 720-top);
    /* paredes laterales (tierra cortada) en sombra */
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.fillRect(a, top, 12, 720-top);
    ctx.fillRect(b-12, top, 12, 720-top);
    /* labio de piedra rota en los bordes superiores */
    ctx.fillStyle='#3b424b';
    ctx.fillRect(a-3, top-5, 9, 9);
    ctx.fillRect(b-6, top-5, 9, 9);
    ctx.fillStyle='#262d34';
    ctx.fillRect(a-3, top+4, 6, 5);
    ctx.fillRect(b-3, top+4, 6, 5);
    /* destellos rojos de peligro al filo */
    ctx.fillStyle='rgba(192,57,43,.6)';
    ctx.fillRect(a-1, top-3, 3, 12);
    ctx.fillRect(b-2, top-3, 3, 12);
  }

  /* --- anaqueles como plataformas: la TAPA del sprite calza en su py --- */
  for (const pl of L.platforms){
    const cfg=SHELF_TYPES[pl.type], img=sprites[cfg.sprite];
    if (!img) continue;
    const h=cfg.h, w=img.width*(h/img.height);
    const px=pl.x, py=L.groundY-h;
    if (px+w<camX-80 || px>camX+viewW+80) continue;
    /* sombra de apoyo en el piso */
    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.beginPath(); ctx.ellipse(px+w/2, L.groundY+6, w*.42, 8, 0,0,Math.PI*2); ctx.fill();
    ctx.drawImage(img, px, py, w, h);
  }
}

function drawExit(){
  const L=Game.lvl, x=L.exitX, y=L.groundY;
  /* puerta industrial con letrero SALIDA */
  ctx.fillStyle='#10151c';
  ctx.fillRect(x, y-150, 92, 150);
  ctx.strokeStyle='#2c3642'; ctx.lineWidth=4;
  ctx.strokeRect(x+2, y-148, 88, 148);
  for(let i=1;i<5;i++){ ctx.beginPath(); ctx.moveTo(x+4,y-150+i*30); ctx.lineTo(x+88,y-150+i*30); ctx.stroke(); }
  const glow = .7+.3*Math.sin(Game.time*4);
  ctx.fillStyle=`rgba(126,240,192,${glow})`;
  ctx.font='bold 17px Arial Black, sans-serif';
  ctx.textAlign='center';
  ctx.fillText('SALIDA', x+46, y-160);
  ctx.shadowColor='rgba(126,240,192,.8)'; ctx.shadowBlur=14;
  ctx.fillText('SALIDA', x+46, y-160);
  ctx.shadowBlur=0;
}

function drawCoins(){
  for (const c of Game.coins){
    if (c.got) continue;
    const squash = Math.abs(Math.sin(c.t));     // giro fake: escala X
    const bobY = Math.sin(c.t*.8)*5;
    ctx.save();
    ctx.translate(c.x+c.w/2, c.y+c.h/2+bobY);
    ctx.scale(Math.max(squash,.15),1);
    ctx.shadowColor='rgba(232,177,58,.55)'; ctx.shadowBlur=12;
    ctx.drawImage(sprites.coin, -c.w/2, -c.h/2, c.w, c.h);
    ctx.restore();
  }
}

function drawZombies(){
  for (const z of Game.zombies){
    let img = sprites['zwalk'+(1+(Math.floor(z.walkPhase||0)%4))] || sprites.zombie;
    ctx.save();
    ctx.globalAlpha=z.fade;
    const bobY=Math.sin(z.bob)*2;
    const dh=98, dw=img.width*(dh/img.height);
    ctx.translate(z.x+z.w/2, z.y+z.h+bobY);   // origen = pies
    /* sombra */
    ctx.globalAlpha=z.fade*.3; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(0,2,z.w*.46,6,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=z.fade;
    /* el sprite mira a la DERECHA; el zombie avanza hacia +dir, así que
       lo volteamos cuando va hacia la izquierda */
    ctx.scale(z.dir<0?-1:1, 1);
    if (z.hitT>0) ctx.filter='brightness(2.4)';
    ctx.drawImage(img, -dw/2, -dh, dw, dh);
    ctx.restore();
  }
}

function drawBeams(){
  for (const b of Game.beams){
    ctx.save();
    ctx.shadowColor='rgba(126,240,192,.9)'; ctx.shadowBlur=16;
    const grad=ctx.createLinearGradient(b.x,0,b.x+b.w,0);
    grad.addColorStop(0,'rgba(126,240,192,.1)');
    grad.addColorStop(1,'#bffde6');
    ctx.fillStyle=grad;
    ctx.fillRect(b.x, b.y-b.h/2, b.w, b.h);
    ctx.restore();
  }
}

function drawPlayer(){
  const P=Game.player;
  /* parpadeo durante invulnerabilidad */
  if (P.inv>0 && Math.floor(P.inv*12)%2===0) return;
  const moving = Math.abs(P.vx)>20;
  /* elegir frame: aire -> pose de zancada; caminando -> ciclo; quieto -> frame 1 */
  let img;
  const shooting = P.shootCd > .14;
  if (!P.onGround)      img = sprites.jump  || sprites.walk2;
  else if (shooting)    img = sprites.fire  || sprites.walk1;
  else if (moving)      img = sprites['walk'+(1+(Math.floor(P.walkPhase)%4))];
  else                  img = sprites.walk1;
  if (!img) img = sprites.walk1;
  const idleBob = (!moving && P.onGround) ? Math.sin(Game.time*3)*1.5 : 0;
  const dh = 98, dw = img.width*(dh/img.height);
  ctx.save();
  ctx.translate(P.x+P.w/2, P.y+P.h + idleBob);   // origen = pies, centrado en x
  /* sombra */
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(0, 2, P.w*.5, 7, 0,0,Math.PI*2); ctx.fill();
  ctx.scale(P.dir>0?1:-1,1);                       // los frames miran a la derecha
  ctx.drawImage(img, -dw/2, -dh, dw, dh);
  ctx.restore();
}

function drawParticles(){
  for (const p of Game.particles){
    ctx.globalAlpha=clamp(p.life*3,0,1);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* --- FIRMA VISUAL: el warehouse está a oscuras y el Hunter lleva linterna.
       Capa de oscuridad con dos "agujeros": halo alrededor del jugador
       y cono de linterna hacia donde mira. --- */
let darkCv=null, darkCtx=null;
function drawDarknessAndFlashlight(){
  const G=Game, P=G.player, viewW=VW/SCALE;
  if (!darkCv){ darkCv=document.createElement('canvas'); darkCtx=darkCv.getContext('2d'); }
  if (darkCv.width!==Math.ceil(viewW)||darkCv.height!==720){ darkCv.width=Math.ceil(viewW); darkCv.height=720; }
  const d=darkCtx;
  d.clearRect(0,0,darkCv.width,720);
  d.fillStyle='rgba(4,6,9,.6)';
  d.fillRect(0,0,darkCv.width,720);
  d.globalCompositeOperation='destination-out';

  const px=P.x+P.w/2-G.cam.x, py=P.y+P.h*.42;
  /* halo alrededor del Hunter */
  let g=d.createRadialGradient(px,py,20,px,py,170);
  g.addColorStop(0,'rgba(0,0,0,.95)'); g.addColorStop(1,'rgba(0,0,0,0)');
  d.fillStyle=g;
  d.beginPath(); d.arc(px,py,170,0,Math.PI*2); d.fill();

  /* cono de linterna */
  const len=430, spread=120, dir=P.dir;
  const tipX=px+dir*30, tipY=py-6;
  g=d.createRadialGradient(tipX,tipY,10,tipX,tipY,len);
  g.addColorStop(0,'rgba(0,0,0,.95)');
  g.addColorStop(.7,'rgba(0,0,0,.55)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  d.fillStyle=g;
  d.beginPath();
  d.moveTo(tipX,tipY);
  d.lineTo(tipX+dir*len, tipY-spread*.55);
  d.lineTo(tipX+dir*len, tipY+spread);
  d.closePath(); d.fill();

  /* la lámpara del fondo ya ilumina por sí sola (horneada en la imagen) */
  d.globalCompositeOperation='source-over';

  ctx.drawImage(darkCv, G.cam.x, 0);
}

/* ---------------- BUCLE PRINCIPAL ---------------- */
let last=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-last)/1000,.033); last=t;
  if (Game.state==='play'){ update(dt); draw(); }
  else if (Game.state==='pause'||Game.state==='over'||Game.state==='win'){ draw(); }
}

/* arranque */
loadSprites().then(()=>{
  resize();
  requestAnimationFrame(loop);
});

</script>
